# Render Blueprint for CivicSentinel Website
# This configuration deploys the Next.js web application to Render's Free tier.

services:
  - type: web
    name: civicsentinel-web
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    branch: main
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_CONVEX_URL
        value: https://steady-impala-3.convex.cloud
      - key: NEXT_PUBLIC_CONVEX_SITE_URL
        value: https://steady-impala-3.convex.site
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        value: pk_test_bmF0aW9uYWwteWFrLTk2LmNsZXJrLmFjY291bnRzLmRldiQ
      - key: CLERK_SECRET_KEY
        generateValue: true # Or provide your secret here, but it's safer to add it in Render UI
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /sign-up
      - key: NEO4J_URI
        value: neo4j+s://1695dc0e.databases.neo4j.io
